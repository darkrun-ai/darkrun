# Codecov behavior for darkrun. Coverage is produced by the `coverage` workflow
# (cargo-tarpaulin → cobertura). The project is held to an informational target
# so coverage is TRACKED without blocking merges (the hard gate is `ci`).

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

# Don't count generated / non-application code against coverage.
ignore:
  - "web/site/**" # wasm SPA — not exercised by native tests
  - "web/app/**" # wasm app — ditto
  - "**/tests/**" # integration test harnesses
  - "**/*.js" # the browser collector + injector example
  - "infra/**" # Terraform

comment:
  layout: "reach, diff, files"
  require_changes: true
