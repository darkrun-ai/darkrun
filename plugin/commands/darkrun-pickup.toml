description = "Advance a darkrun Run — the factory manager returns the next concrete action"
prompt = """
Advance the active darkrun Run. Follow the `darkrun-pickup` skill:

1. Call `darkrun_run_next` (no arg resumes the active Run). The manager walks the three-track
   priority (drift → feedback → run) and the Station phase machine and returns a structured next
   action.
2. Do exactly what it returns — the specified Station / Worker (Make → Challenge → Resolve),
   Explorers, decomposition, Reviewers, or Checkpoint hold. Don't improvise the sequence.
3. At a Checkpoint: `auto` advances itself; `ask` → confirm with the user then
   `/darkrun:darkrun-checkpoint`; `external`/`await` → hold.
4. Call `darkrun_run_next` again and loop until the manager reports completion.
"""
