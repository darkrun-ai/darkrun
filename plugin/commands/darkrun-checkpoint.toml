description = "Review and decide a Station's Checkpoint — approve to advance, or request changes to route rework as drift"
prompt = """
Decide a darkrun Checkpoint. Follow the `darkrun-checkpoint` skill:

1. Use `/darkrun:darkrun-show` to see the holding Station, its Units, and the Reviewers' findings.
2. Summarize to the user what the Station produced and what Reviewers flagged; for an `ask`
   Checkpoint, ask them to approve or request changes.
3. Call `darkrun_checkpoint_decide`:
   - `decision: "approve"` → the artifact locks and the manager advances.
   - `decision: "request_changes"` with `notes` → the manager routes rework as drift (Build for
     defects, Shape for structural issues).
4. Then call `/darkrun:darkrun-pickup` to continue.
"""
