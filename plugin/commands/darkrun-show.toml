description = "Show a darkrun Run's state — Stations, Units, completion criteria, and Checkpoint status"
prompt = """
Show the darkrun Run state. Follow the `darkrun-show` skill:

1. Call `darkrun_run_show` (optionally with a Run slug/id) for title, factory, current Station,
   phase, and Checkpoint status.
2. Call `darkrun_unit_list { run, station }` for the Units and their completion criteria.
3. Present: current Station and phase → Units done / in-progress / blocked → next Checkpoint. Lead
   with where the Run is and what's next. Offer `/darkrun:darkrun-pickup` to advance.
"""
