description = "Install, remove, or preview the darkrun Claude Code status line"
prompt = """
Manage the darkrun status line. Follow the `darkrun-statusline` skill.

- To install: run `darkrun statusline install` (project) or `darkrun statusline install --global`.
  Inside a plugin install, pass `--command "${CLAUDE_PLUGIN_ROOT}/bin/darkrun statusline"`.
- To remove: run `darkrun statusline uninstall` (add `--global` if installed globally).
- To preview without installing: `echo '{"workspace":{"current_dir":"'$PWD'"}}' | darkrun statusline`.

The line shows the active Run's station pipeline, current station, phase, and unit aggregate. With
no active Run it prints nothing and Claude Code keeps your previous line.
"""
