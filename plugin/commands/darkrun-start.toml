description = "Start a new darkrun Run — describe what you want to accomplish and the factory manager scaffolds a right-sized lifecycle"
prompt = """
Start a new darkrun Run. Follow the `darkrun-start` skill:

1. If the description is short or vague, prelaborate with 2–3 `AskUserQuestion` prompts and fold the
   answers into a richer description. If a file was referenced, read it and synthesize its substance
   (never store the path).
2. Do a quick context scan (2–3 tool calls) of the project.
3. Call `darkrun_factory_list`, then pick 2–4 `factory_candidates`.
4. Call `darkrun_run_start { title, description, slug, context, factory_candidates }`. The title is a
   crisp 3–8 word name — not a truncated description.
5. Right-sizing is automatic — don't pick a mode. Then hand off to `/darkrun:darkrun-pickup`.
"""
