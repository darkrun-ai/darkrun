description = "List available darkrun factories and their Stations"
prompt = """
List darkrun factories. Follow the `darkrun-factories` skill:

1. Call `darkrun_factory_list` for registered factories with descriptions and Station sequences.
2. Present a short table: factory → purpose → Stations. For the software factory the Stations are
   Frame → Specify → Shape → Build → Prove → Harden.
3. If the user is choosing where to run work, recommend the closest fit and offer
   `/darkrun:darkrun-start`.
"""
