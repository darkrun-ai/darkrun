name: deploy-web

# Build the darkrun-web container (OAuth broker + static site), push it to
# Artifact Registry, then roll it onto Cloud Run via an HCP Terraform (Terraform
# Cloud) run.
#
# Two auth boundaries:
#   - GitHub Actions -> GCP (build + push the image): Workload Identity Federation.
#       secrets.GCP_WORKLOAD_IDENTITY_PROVIDER, secrets.GCP_DEPLOY_SA
#   - GitHub Actions -> HCP Terraform (apply): an API token.
#       secrets.TF_API_TOKEN   (used as TF_TOKEN_app_terraform_io)
#   - HCP Terraform -> GCP (the run itself applies): configured IN the TFC
#       workspace (GCP dynamic provider credentials, or a SA key variable), plus
#       SENTRY_AUTH_TOKEN + the sentry_* vars as workspace variables.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "infra/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for Workload Identity Federation

env:
  GCP_PROJECT: darkrun
  GCP_REGION: us-central1
  REPO: darkrun
  IMAGE: darkrun-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Compute image tag
        id: tag
        run: |
          sha="${GITHUB_SHA::12}"
          base="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${REPO}/${IMAGE}"
          echo "image=${base}:${sha}" >> "$GITHUB_OUTPUT"
          echo "latest=${base}:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        run: |
          docker build -t "${{ steps.tag.outputs.image }}" -t "${{ steps.tag.outputs.latest }}" .
          docker push "${{ steps.tag.outputs.image }}"
          docker push "${{ steps.tag.outputs.latest }}"

      - name: Set up Terraform (HCP Terraform CLI)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # init connects to the TFC workspace; apply triggers a remote run that
      # applies with the freshly-pushed image. Sentry org/team/token and the GCP
      # run credentials are configured as TFC workspace variables (not here).
      - name: Terraform apply (remote run)
        working-directory: infra
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -var="web_image=${{ steps.tag.outputs.image }}"
