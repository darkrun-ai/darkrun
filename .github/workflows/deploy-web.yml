name: build-web-image

# Build the darkrun-web container (OAuth broker + static site), push it to
# Artifact Registry, AND roll a new Cloud Run revision onto it. Terraform
# (`darkrun-infra`, VCS-driven on TFC) still owns the service's SHAPE — env vars,
# Secret Manager mounts, scaling, domain mapping; `gcloud run services update
# --image` swaps ONLY the image and leaves everything Terraform set intact.
# (TFC's web_image stays `:latest`; the revision below pins the exact `:sha` just
# built — reconcile by setting web_image to that tag if you want strict parity.)
#
# Auth (GitHub Actions -> GCP) is Workload Identity Federation, no static key:
#   secrets.GCP_WORKLOAD_IDENTITY_PROVIDER, secrets.GCP_BUILD_SA.
# The build SA needs roles/run.developer + roles/iam.serviceAccountUser on the
# darkrun-web runtime SA to deploy the revision (it already has Artifact Registry
# writer + firebasehosting.admin).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["web/**", "crates/**", "Cargo.toml", "Cargo.lock", "Dockerfile"]

permissions:
  contents: read
  id-token: write # for Workload Identity Federation

env:
  GCP_PROJECT: darkrun
  GCP_REGION: us-central1
  REPO: darkrun
  IMAGE: darkrun-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_BUILD_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Compute image tag
        id: tag
        run: |
          sha="${GITHUB_SHA::12}"
          base="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${REPO}/${IMAGE}"
          echo "image=${base}:${sha}" >> "$GITHUB_OUTPUT"
          echo "latest=${base}:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        run: |
          docker build -t "${{ steps.tag.outputs.image }}" -t "${{ steps.tag.outputs.latest }}" .
          docker push "${{ steps.tag.outputs.image }}"
          docker push "${{ steps.tag.outputs.latest }}"

      # Roll a new Cloud Run revision onto the freshly-pushed image. `--image`
      # is a partial update: it swaps the container image and leaves the env,
      # secrets, scaling, and domain mapping Terraform manages untouched. Without
      # this the service keeps running the previous revision (a `:latest` push
      # alone never rolls a new revision).
      - name: Deploy the new image to Cloud Run
        run: |
          gcloud run services update "${IMAGE}" \
            --project "${GCP_PROJECT}" --region "${GCP_REGION}" \
            --image "${{ steps.tag.outputs.image }}" \
            --quiet
