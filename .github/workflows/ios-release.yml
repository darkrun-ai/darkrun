name: ios-release

# Build the darkrun iOS app and upload it to the App Store on a version tag
# (release-please pushes `vX.Y.Z` when its release PR merges — the same trigger as
# release.yml). The binary + metadata are uploaded but NOT submitted for review;
# a human hits "Submit" in App Store Connect. Auth + signing as in ios-testflight.
#
# Fires AUTOMATICALLY on a version tag — release-please pushes `vX.Y.Z` when its
# release PR merges, so a GA App Store build is cut with no manual step (uploaded,
# not auto-submitted; a human hits "Submit"). GA is tag-driven on purpose:
# continuous beta builds are ios-testflight's job. workflow_dispatch stays for
# on-demand rebuilds.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.7.0). Defaults to the tag."
        required: false

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so `git rev-list --count` is the real build number

      - name: Resolve version
        id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
          else
            ver=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          # Same monotonic build number as the RC stream (commit count), so the GA
          # build number is higher than every RC that preceded it.
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust (+ iOS target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dx (Dioxus CLI)
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Set up Ruby + fastlane (bundler)
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile

      - name: Install signing (match)
        run: bundle exec fastlane ios install_signing
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      # Newest NON-beta Xcode: Apple needs the iOS 26 SDK but rejects beta-built
      # binaries ("use the latest Release Candidate").
      - name: Select newest released Xcode (iOS 26 SDK, no betas)
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          [ -n "$latest" ] && sudo xcode-select -s "$latest/Contents/Developer" || true
          xcodebuild -version
          echo "iphoneos SDK: $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo '?')"

      # --target aarch64-apple-ios forces a DEVICE build (dx defaults to the
      # simulator triple, which App Store validation rejects). IPHONEOS_DEPLOYMENT
      # _TARGET pins the link target off Rust's 10.0 default (which misses
      # ___chkstk_darwin → undefined symbols).
      - name: Build the iOS app (Dioxus)
        run: dx build --package darkrun-desktop --platform ios --release --target aarch64-apple-ios
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "15.0"
          # Bake the Sentry DSN + release into the binary at compile time
          # (darkrun-telemetry reads DARKRUN_SENTRY_DSN via option_env!). The DSN
          # is a public ingest key, stored as a repo secret only to keep it out of
          # logs; if the secret is unset, telemetry compiles out (no-op).
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ steps.v.outputs.version }}

      - name: Sign + package the .ipa
        run: ./fastlane/package-ios-ipa.sh
        env:
          DARKRUN_MARKETING_VERSION: ${{ steps.v.outputs.version }}
          DARKRUN_BUILD_NUMBER: ${{ steps.v.outputs.build }}

      - name: Upload to the App Store (no auto-submit)
        run: bundle exec fastlane ios release
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          DARKRUN_RELEASE_VERSION: ${{ steps.v.outputs.version }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
