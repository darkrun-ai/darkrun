name: macos-appstore

# Build the darkrun macOS app (Dioxus → .app → signed .pkg) and ship it to
# testers. Auth is an App Store Connect API key; signing is fastlane `match` (the
# macOS MAS cert types).
#
# Builds AUTOMATICALLY on every push to main that touches the app. A push is a
# release CANDIDATE, so it goes to TESTFLIGHT via pilot (`mac_beta`), mirroring
# ios-testflight.yml. It used to go through `mac_release` (deliver, the App Store
# submission path), which only INCIDENTALLY surfaced builds in TestFlight: builds
# 864/866 appeared that way but 868 completed processing and NEVER became
# "available to test" on macOS, with no failure from Apple, so Mac testers
# silently stayed a build behind. pilot puts the build in TestFlight explicitly.
#
# The deliberate App Store push is workflow_dispatch (`mac_release`, uploaded but
# NOT submitted; a human hits "Submit" in App Store Connect). Nothing is lost by
# routing automatic builds to TestFlight: a pilot-uploaded build still lands in
# App Store Connect and stays selectable for a release. Build number = commit
# count, so each build is monotonically newer. Web/server-only pushes don't
# rebuild.

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fastlane/**"
      - ".github/workflows/macos-appstore.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.7.0). Defaults to Cargo.toml."
        required: false

concurrency:
  group: macos-appstore
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  appstore:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so `git rev-list --count` is the real build number

      - name: Resolve version
        id: v
        shell: bash
        run: |
          # A TAG push (vX.Y.Z) uses the tag as the marketing version; a BRANCH
          # push (main, the continuous build) and dispatch fall back to the
          # Cargo.toml version. Keying on event_name="push" broke the branch case
          # (ref_name was "main", which Apple rejects as CFBundleShortVersionString).
          if [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
          else
            ver=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          # Same monotonic build number as the RC stream (commit count), so the GA
          # build number is higher than every RC that preceded it.
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dx (Dioxus CLI)
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Set up Ruby + fastlane (bundler)
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile

      # Install the Mac App Store certs + provisioning profile (match) BEFORE the
      # build, so codesign/productbuild have them.
      - name: Install signing (match macos)
        run: bundle exec fastlane mac install_signing_macos
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      # Newest NON-beta Xcode: Apple needs the current SDK but rejects beta-built
      # binaries ("use the latest Release Candidate").
      - name: Select newest released Xcode (no betas)
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          [ -n "$latest" ] && sudo xcode-select -s "$latest/Contents/Developer" || true
          xcodebuild -version
          echo "macosx SDK: $(xcrun --sdk macosx --show-sdk-version 2>/dev/null || echo '?')"

      # dx bundle emits the macOS `.app` (no Xcode project); package-macos-pkg.sh
      # then signs it for the App Store and wraps it in a signed installer .pkg.
      - name: Bundle the macOS app (Dioxus)
        # The bundle is arm64-only. Apple rejects arm64-only Mac apps unless the
        # deployment target is macOS 12.0+ ("supports arm64 but not Intel … your
        # macOS deployment target must be 12.0 or higher"). MACOSX_DEPLOYMENT_TARGET
        # sets the arm64 Mach-O's LC_BUILD_VERSION minos so App Store validation
        # accepts it (package-macos-pkg.sh sets the matching LSMinimumSystemVersion).
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          # Bake the Sentry DSN + release into the binary at compile time
          # (darkrun-telemetry reads DARKRUN_SENTRY_DSN via option_env!). The DSN
          # is a public ingest key, stored as a repo secret only to keep it out of
          # logs; if the secret is unset, telemetry compiles out (no-op).
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ steps.v.outputs.version }}
          # Bake the version + build into the binary at COMPILE time so the app's
          # About/footer can show them via option_env!. They only reach Info.plist
          # post-compile (packaging step below), so they must be on this step too.
          DARKRUN_MARKETING_VERSION: ${{ steps.v.outputs.version }}
          DARKRUN_BUILD_NUMBER: ${{ steps.v.outputs.build }}
        run: dx bundle --package darkrun-desktop --platform macos --release

      - name: Sign + package the .pkg
        run: ./fastlane/package-macos-pkg.sh
        env:
          DARKRUN_MARKETING_VERSION: ${{ steps.v.outputs.version }}
          DARKRUN_BUILD_NUMBER: ${{ steps.v.outputs.build }}

      # A main push is a release CANDIDATE, so it goes to TestFlight via pilot
      # (`mac_beta`) exactly like ios-testflight.yml does. Routing RCs through
      # `mac_release` (deliver) uploaded them as App Store submission candidates,
      # which only INCIDENTALLY appear in TestFlight: build 868 processed and
      # never became "available to test" on macOS, with no failure from Apple, so
      # Mac testers silently stayed on 866. A TAG (vX.Y.Z) still takes the App
      # Store path.
      - name: Upload to TestFlight (main push = release candidate)
        if: github.event_name == 'push'
        run: bundle exec fastlane mac mac_beta
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          DARKRUN_PKG: ${{ env.DARKRUN_PKG }}
          DARKRUN_MARKETING_VERSION: ${{ steps.v.outputs.version }}
          DARKRUN_BUILD_NUMBER: ${{ steps.v.outputs.build }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

      # The deliberate App Store push stays on manual dispatch. A pilot-uploaded
      # build still lands in App Store Connect and stays selectable for a release,
      # so nothing is lost by routing every automatic build to TestFlight.
      - name: Upload to the Mac App Store (manual dispatch, no auto-submit)
        if: github.event_name == 'workflow_dispatch'
        run: bundle exec fastlane mac mac_release
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          DARKRUN_PKG: ${{ env.DARKRUN_PKG }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
