name: rust-quality

# Rust code quality + security, scanning the repo's MAIN language — which the
# default CodeQL setup doesn't cover. Deliberately NOT a CodeQL workflow (those
# can't coexist with the default setup): instead it runs Rust-native tools and
# uploads their results to the same Security tab as third-party SARIF, which DOES
# coexist with default CodeQL.
#
#   - clippy  → SARIF → code scanning alerts (lint + correctness)
#   - cargo-audit → RustSec advisory check (dependency vulnerabilities)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: rust-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clippy:
    name: clippy → code scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the SARIF
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Configure git identity (for fixture-touching builds)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"

      - name: Install clippy-sarif + sarif-fmt
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: clippy-sarif,sarif-fmt

      # Warnings don't fail clippy (no `-D`), so this produces SARIF for the
      # Security tab without blocking — `ci` stays the hard gate.
      - name: Run clippy → SARIF
        run: |
          cargo clippy --workspace --all-targets --message-format=json \
            | clippy-sarif | tee rust-clippy.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rust-clippy.sarif
          category: clippy

  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-audit
      # GATING: cargo-audit fails the PR on any advisory EXCEPT the documented
      # transitive ones darkrun can't fix directly. A FIXABLE advisory is fixed by
      # upgrading (e.g. quinn-proto was bumped 0.11.14 -> 0.11.15 for
      # RUSTSEC-2026-0185), never ignored. Each `--ignore` below is a deliberate,
      # reviewed exception with no upgrade path; anything NEW fails the job.
      #
      # Ignored (transitive, no fix available), reconciled against a live audit:
      #   RUSTSEC-2023-0071  rsa Marvin timing sidechannel — no fixed release exists
      #   gtk-rs GTK3 bindings, unmaintained (via the dioxus desktop graph, GTK3 is EOL):
      #     0411 gdkwayland-sys  0412 gdk       0413 atk        0414 gdkx11-sys
      #     0415 gtk            0416 atk-sys    0418 gdk-sys    0419 gtk3-macros
      #     0420 gtk-sys        0429 glib       0370 proc-macro-error
      #   RUSTSEC-2024-0436  paste unmaintained (proc-macro, no successor pinned)
      #   RUSTSEC-2025-0057  fxhash unmaintained (transitive)
      #   RUSTSEC-2026-0097  rand unsound w/ custom logger (transitive, no fixed release)
      #   RUSTSEC-2026-0186  memmap2 unchecked ptr offset (transitive, no fixed release)
      #   RUSTSEC-2026-0190  anyhow downcast_mut unsoundness (transitive, no fixed release)
      # Do NOT broaden this to silence darkrun's own crates.
      - name: Audit dependencies (gating)
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0186 \
            --ignore RUSTSEC-2026-0190
