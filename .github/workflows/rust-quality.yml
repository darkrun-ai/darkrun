name: rust-quality

# Rust code quality + security, scanning the repo's MAIN language — which the
# default CodeQL setup doesn't cover. Deliberately NOT a CodeQL workflow (those
# can't coexist with the default setup): instead it runs Rust-native tools and
# uploads their results to the same Security tab as third-party SARIF, which DOES
# coexist with default CodeQL.
#
#   - clippy  → SARIF → code scanning alerts (lint + correctness)
#   - cargo-audit → RustSec advisory check (dependency vulnerabilities)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: rust-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clippy:
    name: clippy → code scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the SARIF
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Configure git identity (for fixture-touching builds)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"

      - name: Install clippy-sarif + sarif-fmt
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: clippy-sarif,sarif-fmt

      # Warnings don't fail clippy (no `-D`), so this produces SARIF for the
      # Security tab without blocking — `ci` stays the hard gate.
      - name: Run clippy → SARIF
        run: |
          cargo clippy --workspace --all-targets --message-format=json \
            | clippy-sarif | tee rust-clippy.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy.sarif
          category: clippy

  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: cargo-audit
      # GATING: cargo-audit fails the PR on any advisory EXCEPT the documented
      # transitive ones darkrun can't fix directly (they come in through the
      # dioxus/webview graph, not darkrun's own deps). Each `--ignore` is a
      # deliberate, reviewed exception; anything NEW (a fixable vuln in a crate we
      # control, or a fresh advisory) fails the job. This replaces the old
      # `|| true` report-only posture so audit is a real gate again.
      #
      # Seeded ignores (transitive, no direct fix):
      #   RUSTSEC-2024-0429  glib <0.20 VariantStrIter unsoundness (via webview)
      #   RUSTSEC-2024-0370  proc-macro-error 1.x unmaintained (via webview macros)
      # NOTE: this list must be reconciled against a live `cargo audit` run — the
      # fix environment had no advisory DB, so additional transitive advisories in
      # the current lockfile may need appending on the first CI run (see the PR's
      # needs-owner note). Do NOT broaden it to silence darkrun's own crates.
      - name: Audit dependencies (gating)
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0370
