name: coverage

# Code-coverage tracking with cargo-tarpaulin (the codebase is already annotated
# with `#[cfg(not(tarpaulin_include))]` on the irreducible-I/O paths) → Codecov.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Hard cap so a wedged instrumentation run fails fast instead of hanging.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # The workspace compiles a heavy dep graph twice under instrumentation;
      # reclaim disk first (same cleanup as the `ci` workflow).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      # Fixture tests in darkrun-git shell out to `git`; give the runner an
      # identity so `git commit` succeeds.
      - name: Configure git identity (for fixture tests)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"
          git config --global init.defaultBranch main

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: cargo-tarpaulin

      # Scope to the LIBRARY crates' coverage. Excluded:
      #   - darkrun-cli / darkrun-e2e: their tests fork the `darkrun` binary
      #     thousands of times, so llvm instrumentation emits thousands of
      #     .profraw files and the merge step hangs (the original 21-min cancel).
      #   - darkrun-desktop: links the native webview, not unit-tested.
      #   - darkrun-site / darkrun-app: wasm-only, no meaningful native tests.
      # What's left — core / mcp / http / api / git / content / prompts / vcs /
      # harness / verify — is the engine, where coverage actually matters.
      # `--lib` skips integration tests (the other subprocess source).
      - name: Run coverage
        run: |
          cargo tarpaulin --workspace \
            --exclude darkrun-cli \
            --exclude darkrun-e2e \
            --exclude darkrun-desktop \
            --exclude darkrun-site \
            --exclude darkrun-app \
            --lib \
            --engine llvm \
            --out Xml --output-dir target/tarpaulin \
            --timeout 180 --skip-clean

      - name: Upload to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/tarpaulin/cobertura.xml
          fail_ci_if_error: false
