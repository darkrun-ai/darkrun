name: coverage

# Code-coverage tracking with cargo-tarpaulin (the codebase is already annotated
# with `#[cfg(not(tarpaulin_include))]` on the irreducible-I/O paths) → Codecov.
#
# INFORMATIONAL ONLY — this job is NOT a merge gate. It measures a subset (the
# library crates; cli/e2e/desktop/site/app excluded, `--lib`) and uploads it to
# Codecov with `fail_ci_if_error: false`; codecov.yml marks the status
# `informational: true`. It runs no `--fail-under`, so a low number (currently
# ~77%) never blocks a PR. The 99% floor in tarpaulin.toml is the LOCAL
# full-workspace posture (`./scripts/coverage.sh`), not this CI job. The hard
# merge gate is `ci` (build + test + `-D warnings` clippy).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Hard cap so a wedged instrumentation run fails fast instead of hanging.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # The workspace compiles a heavy dep graph twice under instrumentation;
      # reclaim disk first (same cleanup as the `ci` workflow).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      # Fixture tests in darkrun-git shell out to `git`; give the runner an
      # identity so `git commit` succeeds.
      - name: Configure git identity (for fixture tests)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"
          git config --global init.defaultBranch main

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-tarpaulin

      # Scope to the LIBRARY crates' coverage. Excluded:
      #   - darkrun-cli / darkrun-e2e: their tests fork the `darkrun` binary
      #     thousands of times, so llvm instrumentation emits thousands of
      #     .profraw files and the merge step hangs (the original 21-min cancel).
      #   - darkrun-desktop: links the native webview, not unit-tested.
      #   - darkrun-site: wasm-only content, no meaningful native tests.
      # darkrun-app IS included: its routing/frame/URL helpers have native #[test]
      # coverage (the wasm-app CI job proves it builds+tests native).
      # What's left — core / mcp / http / api / git / content / prompts / vcs /
      # harness / verify — is the engine, where coverage actually matters.
      # `--lib` skips integration tests (the other subprocess source).
      - name: Run coverage
        run: |
          cargo tarpaulin --workspace \
            --exclude darkrun-cli \
            --exclude darkrun-e2e \
            --exclude darkrun-desktop \
            --exclude darkrun-site \
            --lib \
            --engine llvm \
            --out Xml --output-dir target/tarpaulin \
            --timeout 180 --skip-clean

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/tarpaulin/cobertura.xml
          fail_ci_if_error: false
