name: release

# Build per-arch native `darkrun` binaries, publish them to npm, AND attach the
# tarballs to the GitHub Release. Triggered by the version TAG that release-please
# pushes when its release PR merges (release-please creates the matching release as
# a DRAFT — see release-please-config.json `draft: true`).
#
# Why the tag (not the `release` event): GitHub treats a PUBLISHED release as
# IMMUTABLE, so assets can't be attached after the fact. So release-please leaves
# the release a draft; this workflow attaches the tarballs to the draft (mutable),
# then the `publish-release` job un-drafts it once binaries AND npm are live. A
# failed build leaves a draft (retryable), never a published-but-empty release.
# The tag push fires reliably because release-please pushes it with a PAT.
#
# npm publish uses OIDC Trusted Publishing — no NPM_TOKEN (configure the trusted
# publisher on each package: repo darkrun-ai/darkrun, workflow release.yml).

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.2.0). Defaults to the Cargo.toml version."
        required: false

permissions:
  contents: write

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      ref: ${{ steps.v.outputs.ref }}
    steps:
      - uses: actions/checkout@v7
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            tag="v${{ inputs.version }}"
          else
            ver=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
            tag="v${ver}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "ref=${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm: darwin-arm64
            bin: darkrun
            desktop_bin: darkrun-desktop
          # Cross-compile the Intel binary on an Apple-Silicon runner: GitHub's
          # Intel macos-13 runners are scarce and the job can queue for ages;
          # macos-14 (arm) builds the x86_64 target fine via --target.
          - target: x86_64-apple-darwin
            os: macos-14
            npm: darwin-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          # aarch64-linux: CLI only — cross-compiling the GUI desktop app is not
          # reliable, so it ships without the bundled desktop binary (the engine
          # falls back to DARKRUN_DESKTOP on that platform).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-arm64
            bin: darkrun
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm: win32-x64
            bin: darkrun.exe
            desktop_bin: darkrun-desktop.exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (linux-arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # The desktop app (Wry/Tao) links the system webview at build time.
      - name: Install desktop GUI deps (Linux)
        if: matrix.desktop_bin && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Build
        shell: bash
        # DARKRUN_SENTRY_DSN / DARKRUN_RELEASE are read via option_env! at compile
        # time and baked into the binaries (darkrun-telemetry). The DSN is a public
        # ingest key, not a secret — set as a repo secret only to keep it out of logs.
        env:
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_CLI_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ needs.version.outputs.version }}
        run: |
          cargo build --release -p darkrun-cli --target ${{ matrix.target }}
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            DARKRUN_SENTRY_DSN="${{ secrets.DARKRUN_DESKTOP_SENTRY_DSN }}" \
              cargo build --release -p darkrun-desktop --target ${{ matrix.target }}
          fi

      - name: Stage binaries for npm sub-package
        shell: bash
        run: |
          mkdir -p "npm/${{ matrix.npm }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "npm/${{ matrix.npm }}/bin/${{ matrix.bin }}"
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.desktop_bin }}" \
               "npm/${{ matrix.npm }}/bin/${{ matrix.desktop_bin }}"
          fi

      - name: Package GitHub Release tarball
        shell: bash
        run: |
          mkdir -p dist
          files="${{ matrix.bin }}"
          [ -n "${{ matrix.desktop_bin }}" ] && files="$files ${{ matrix.desktop_bin }}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/darkrun-${{ matrix.target }}.tar.gz" $files

      - name: Upload binary artifact (for npm publish job)
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.npm }}
          # The whole bin/ dir, so darkrun-desktop rides along where it was built.
          path: npm/${{ matrix.npm }}/bin/

      - name: Upload release tarball
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  github-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          path: dist
          merge-multiple: true
      # Attach the tarballs to release-please's DRAFT release. Drafts are mutable,
      # so the upload succeeds (a published release is immutable and rejects it).
      # `draft: true` keeps it a draft — the publish-release job un-drafts it once
      # everything is green.
      - name: Attach tarballs to the draft release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.version.outputs.ref }}
          files: dist/*.tar.gz
          draft: true

  npm-publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    # OIDC Trusted Publishing — no NPM_TOKEN.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.ref }}
      - uses: actions/setup-node@v7
        with:
          # Node 24 ships npm 11.x. OIDC trusted publishing needs npm >= 11.5.1,
          # so we still top-up to the latest below. That upgrade only SUCCEEDS on
          # a Node new enough for npm@11's `engines`: on the old Node 20 pin,
          # `npm install -g npm@latest` DIES on the engine check, which is what
          # left v0.10.0 stuck as a draft. Pinning Node 24 is the fix; the
          # upgrade step then reliably lands npm >= 11.5.1.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Guarantee npm >= 11.5.1 for OIDC trusted publishing. Node 24's bundled
      # npm predates the trusted-publishing GA, so top it up; this command
      # succeeds on Node 24 (unlike Node 20, where it aborted on npm@11's engine
      # requirement).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Re-assert the version everywhere from the tag — in particular the main
      # package's @darkrun/* optionalDependencies pins (release-please bumps the
      # .version fields but not these), so the published darkrun depends on the
      # matching arch packages.
      - name: Stamp version
        run: ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Download all per-arch binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          path: _bins

      - name: Place binaries into npm sub-packages
        shell: bash
        run: |
          for d in _bins/bin-*; do
            plat="${d#_bins/bin-}"
            mkdir -p "npm/${plat}/bin"
            cp "$d"/* "npm/${plat}/bin/"
            chmod +x "npm/${plat}/bin/"* || true
          done

      # Idempotent-safe publish: a re-run of a partially-failed release must not
      # hard-fail on a version npm already has. npm answers a re-publish of an
      # existing version with a 403 ("cannot publish over previously published
      # versions"), so we probe the registry first and skip anything already
      # live (only genuinely-new packages are published). `npm view <name>@<ver>`
      # exits non-zero (E404) when the version is absent, which is the publish
      # signal; a clean exit means it's already up.
      - name: Publish per-arch sub-packages
        shell: bash
        run: |
          set -euo pipefail
          publish_if_new() {
            dir="$1"
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "::notice::${name}@${version} already published, skipping"
            else
              # `./` prefix is required: npm reads a bare `npm/darwin-arm64` as a
              # GitHub `owner/repo` shorthand and tries to git-clone it.
              npm publish "./${dir}" --access public
            fi
          }
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            publish_if_new "npm/${plat}"
          done

      # Same idempotent guard for the main package so a retry after the sub-pkgs
      # already landed doesn't fail on the plugin's own already-published version.
      - name: Publish main darkrun package (plugin)
        shell: bash
        run: |
          set -euo pipefail
          name=$(node -p "require('./plugin/package.json').name")
          version=$(node -p "require('./plugin/package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "::notice::${name}@${version} already published, skipping"
          else
            npm publish ./plugin --access public
          fi

  publish-release:
    # Un-draft the GitHub Release only after the binaries are attached AND npm is
    # live — so "published" means "fully shipped". If any prior job fails, this is
    # skipped and the release stays a draft (retryable), never announced empty.
    needs: [version, github-release, npm-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release (un-draft)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.ref }}
        run: |
          set -euo pipefail
          # Resolve the draft release by tag (drafts aren't addressable by tag via
          # `gh release view`, so list + match).
          rel_id=$(gh api "repos/$REPO/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          if [ -z "$rel_id" ]; then
            echo "::error::no release found for tag $TAG"; exit 1
          fi
          # ASSET GUARD: never un-draft an empty release. Even though this job
          # `needs: github-release`, action-gh-release succeeds with zero files if
          # the tarball artifacts didn't materialize — which would publish a
          # binary-less release. Confirm the draft actually carries assets before
          # flipping draft=false; otherwise fail and leave it a retryable draft.
          asset_count=$(gh api "repos/$REPO/releases/$rel_id" --jq '.assets | length')
          echo "release $TAG (id $rel_id) has $asset_count asset(s)"
          if [ "${asset_count:-0}" -lt 1 ]; then
            echo "::error::release $TAG has no binary assets — staying a draft"; exit 1
          fi
          gh api -X PATCH "repos/$REPO/releases/$rel_id" -F draft=false
          echo "published release $TAG (id $rel_id)"
