name: release-please

# Versioning by release PR (no release-on-every-push, no auto-majors). On each
# push to main, release-please opens/updates a "chore: release X.Y.Z" PR with the
# computed version + changelog from the Conventional Commits since the last
# release. Merging THAT PR cuts the release: it tags vX.Y.Z and creates a DRAFT
# GitHub Release (`draft: true` in release-please-config.json). The TAG push then
# triggers release.yml, which builds the binaries, publishes npm, attaches the
# tarballs to the draft, and finally un-drafts the release. The release stays a
# draft (mutable) until then so GitHub's immutable-release rule doesn't block the
# tarball upload.
#
# Versioning policy (release-please-config.json):
#   - Pre-1.0 (0.x): breaking changes bump the MINOR, features bump the MINOR,
#     fixes bump the PATCH. NO automatic majors — 1.0 is a deliberate human call
#     (cut it with a `Release-As: 1.0.0` commit when the API is stable).
#
# Uses a PAT (RELEASE_PLEASE_TOKEN) rather than the default GITHUB_TOKEN: a tag
# pushed by GITHUB_TOKEN does NOT trigger other workflows, so release.yml would
# never fire. With a PAT, merging the release PR pushes a tag that triggers
# release.yml, and CI also runs on the release PR itself.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
