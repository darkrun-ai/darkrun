name: terraform

# Code quality for the infra/ Terraform — formatting + static lint. No
# `terraform init`/`validate` (those need provider downloads + backend creds);
# fmt + tflint are static and catch the common issues.

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    paths: ["infra/**"]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform:
    name: fmt + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive infra

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest

      # Report-only: tflint's default ruleset is advisory (and noisy on a
      # root-composed config where providers live at the root, not per module).
      # `terraform fmt` above is the hard gate; tflint findings surface in the log
      # for triage without blocking. `--init` loads the bundled ruleset.
      - name: Lint (recursive, advisory)
        continue-on-error: true
        run: |
          tflint --chdir infra --init || true
          tflint --chdir infra --recursive || true
