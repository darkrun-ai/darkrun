name: ios-testflight

# Build the darkrun iOS app (Dioxus → Xcode → signed .ipa) and upload it to
# TestFlight AUTOMATICALLY on every push to main that touches the app. Auth is an
# App Store Connect API key; signing is fastlane `match`. See fastlane/Fastfile
# for the required secrets (ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8, MATCH_GIT_URL,
# MATCH_PASSWORD, MATCH_GIT_BASIC_AUTHORIZATION) — all present; manual runs pass.
#
# The build number is the commit count (CFBundleVersion = git rev-list --count),
# so each pushed build is monotonically newer. workflow_dispatch stays for
# on-demand rebuilds. Web/server/site-only pushes do NOT rebuild the iOS app
# (path filter), since they don't change what ships.

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fastlane/**"
      - ".github/workflows/ios-testflight.yml"
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so `git rev-list --count` is the real build number

      # RC versioning: every main build is a release candidate of the in-dev
      # version (CFBundleShortVersionString = the workspace Cargo.toml version),
      # with a monotonically-increasing build number (CFBundleVersion = the commit
      # count on main). The real release (ios-release.yml) ships the same numbering
      # at the tagged version, so RC and GA build numbers never collide.
      - name: Resolve RC version
        id: ver
        shell: bash
        run: |
          marketing=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          build=$(git rev-list --count HEAD)
          echo "marketing=${marketing}" >> "$GITHUB_OUTPUT"
          echo "build=${build}" >> "$GITHUB_OUTPUT"
          echo "RC v${marketing} build ${build}"

      - name: Install Rust (+ iOS target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dx (Dioxus CLI)
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Set up Ruby + fastlane (bundler)
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile

      # Install the App Store cert + provisioning profile (match) BEFORE the
      # build, so codesign has them.
      - name: Install signing (match)
        run: bundle exec fastlane ios install_signing
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      # Apple requires the iOS 26 SDK for App Store uploads, but REJECTS binaries
      # built with a beta Xcode ("use the latest Release Candidate"). The newest
      # Xcode on the runner can be a beta, so select the newest NON-beta one — its
      # iOS 26 SDK satisfies the mandate.
      - name: Select newest released Xcode (iOS 26 SDK, no betas)
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          [ -n "$latest" ] && sudo xcode-select -s "$latest/Contents/Developer" || true
          xcodebuild -version
          echo "iphoneos SDK: $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo '?')"

      # --target aarch64-apple-ios forces a DEVICE build. Without it dx defaults to
      # the simulator triple (aarch64-apple-ios-sim), and App Store validation
      # rejects the simulator-platform slice ("Simulator platforms aren't permitted"
      # / missing LC_ENCRYPTION_INFO).
      #
      # IPHONEOS_DEPLOYMENT_TARGET: Rust's aarch64-apple-ios target spec defaults
      # the deployment target to 10.0, which links against an old libSystem missing
      # ___chkstk_darwin (iOS 12+) → "Undefined symbols". Pin it to match
      # MinimumOSVersion so the C deps and the final link agree.
      - name: Build the iOS app (Dioxus)
        run: dx build --package darkrun-desktop --platform ios --release --target aarch64-apple-ios
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "15.0"
          # Bake the Sentry DSN + release into the binary at compile time
          # (darkrun-telemetry reads DARKRUN_SENTRY_DSN via option_env!). The DSN
          # is a public ingest key, stored as a repo secret only to keep it out of
          # logs; if the secret is unset, telemetry compiles out (no-op).
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ steps.ver.outputs.marketing }}
          # Bake the version + build into the binary at COMPILE time so the app's
          # About/footer can show them via option_env!. They only reach Info.plist
          # post-compile (packaging step below), so they must be on this step too.
          DARKRUN_MARKETING_VERSION: ${{ steps.ver.outputs.marketing }}
          DARKRUN_BUILD_NUMBER: ${{ steps.ver.outputs.build }}

      - name: Sign + package the .ipa
        run: ./fastlane/package-ios-ipa.sh
        env:
          DARKRUN_MARKETING_VERSION: ${{ steps.ver.outputs.marketing }}
          DARKRUN_BUILD_NUMBER: ${{ steps.ver.outputs.build }}

      - name: Upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile
          DARKRUN_MARKETING_VERSION: ${{ steps.ver.outputs.marketing }}
          DARKRUN_BUILD_NUMBER: ${{ steps.ver.outputs.build }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
