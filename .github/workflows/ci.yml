name: ci

# Validation gate for PRs (and a re-check on main after merge). These are the
# checks branch protection should require before a PR can merge.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Reclaim disk before building. This job compiles the whole workspace TWICE
      # (release + debug test artifacts) over a heavy dep graph (dioxus + the full
      # `image`/AVIF codec set + native webview), which overruns the runner's ~14 GB
      # and fails with "No space left on device". Dropping the preinstalled .NET /
      # Android / GHC / CodeQL toolchains frees ~25 GB.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # The desktop crate links the system webview — needed to compile the
      # whole workspace (clippy/test/build all touch it).
      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      # Some darkrun-git tests build throwaway repos by shelling out to the `git`
      # CLI; a fresh runner has no identity, so `git commit` fails. Give it one.
      - name: Configure git identity (for fixture tests)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"
          git config --global init.defaultBranch main

      # No `cargo fmt --check`: this codebase is intentionally hand-formatted
      # (no rustfmt.toml, never run through rustfmt), so default-rustfmt would
      # rewrite ~all of it. The hard gates are correctness — test + build.

      # Build + test are the blocking gates.
      - name: Build (release)
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

      # Clippy is a BLOCKING gate: the workspace is linted under `-D warnings`,
      # so any lint (or unused import / dead_code / unused_mut) fails the PR.
      - name: Clippy (blocking, -D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Cross-target compile gate. The `rust` job above only builds Linux, so a
  # target-specific break (e.g. the E0282 type-inference failure that killed the
  # v0.5.0 / v0.6.0 releases) would only surface at release time on the macOS /
  # Windows binaries. Compile-check the SHIPPABLE surface (lib + bins) on both so
  # those breaks fail the PR instead. Tests are intentionally excluded: some are
  # inherently Unix-only (chmod 0o000, symlinks, PermissionsExt) and run on the
  # Linux job; the release artifact is lib + bins, which is what must cross-build.
  # `cargo check` (not test/build) keeps it fast; the native webview headers ship
  # with the macOS / Windows runners, so no extra deps.
  cross-check:
    name: check ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}

      - name: Configure git identity (for fixture-touching builds)
        shell: bash
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"
          git config --global init.defaultBranch main

      - name: Check (lib + bins, the shippable surface)
        run: cargo check --workspace --lib --bins
