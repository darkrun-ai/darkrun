name: deploy-app

# Build the Dioxus web app (app.darkrun.ai) and deploy it to Firebase Hosting
# (the `darkrun-app` site in firebase.json) — KEYLESS, via Workload Identity
# Federation, exactly like deploy-web. No service-account key is stored anywhere:
# CI impersonates the `cloudbuild-web` SA (granted firebasehosting.admin in
# infra/main.tf) through the repo-scoped WIF provider.
#
# Manual-only until the WIF secrets exist + the Terraform IAM has applied.
# Enable by uncommenting the `push:` trigger once:
#   secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
#   secrets.GCP_BUILD_SA
# are set (see infra/bootstrap-gha.sh) and `terraform apply` has granted the SA
# Hosting access.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["web/app/**", "crates/darkrun-ui/**", "crates/darkrun-api/**", "firebase.json", "web/well-known/**"]

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true

      - name: Install Rust (+ wasm target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dx (Dioxus CLI)
        run: cargo install dioxus-cli@0.7.9 --locked

      - name: Build the web app
        run: dx build --package darkrun-app --platform web --release

      # Assemble the deploy dir firebase.json points at (web/app/dist): the dx
      # web output + the universal-link well-known files served from /.well-known.
      - name: Assemble dist
        run: |
          rm -rf web/app/dist && mkdir -p web/app/dist/.well-known
          cp -r target/dx/darkrun-app/release/web/public/. web/app/dist/
          cp web/well-known/apple-app-site-association web/app/dist/.well-known/
          cp web/well-known/assetlinks.json web/app/dist/.well-known/
          # The FCM background service worker must be served from the app ROOT
          # (a service worker only controls its own path and below).
          cp web/app/firebase-messaging-sw.js web/app/dist/

      # Keyless auth: federate the GitHub OIDC token to the cloudbuild-web SA.
      # Exports GOOGLE_APPLICATION_CREDENTIALS (the impersonated external_account).
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_BUILD_SA }}

      # firebase-tools can't reliably resolve the WIF external_account ADC on its
      # own (it fails "Failed to authenticate, have you run firebase login?").
      # gcloud handles external_account natively (this is why deploy-web is fine);
      # installing the SDK gives firebase the working ADC the auth step wrote.
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy to Firebase Hosting
        # firebase-tools is pinned: 15.22.1+ (Jun 2026) further regressed WIF ADC
        # handling. 15.22.0 + the gcloud SDK above authenticates reliably.
        run: |
          npm install -g firebase-tools@15.22.0
          firebase deploy --only hosting:darkrun-app --project darkrun --non-interactive
