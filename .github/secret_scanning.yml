# GitHub secret-scanning configuration.
#
# Exclude the Firebase WEB-config files from scanning: they intentionally contain
# the PUBLIC Firebase Web API key (it ships in client JS and is safe to commit —
# https://firebase.google.com/docs/projects/api-keys). The key is locked to
# darkrun domains (HTTP-referrer + Firebase API allowlist) and Firestore rules
# require auth, so it grants no access on its own. Without this, the scanner
# re-flags the key every time these files change.
#
# Scope is deliberately narrow — only these three files — so every other path is
# still scanned for genuine secrets.
paths-ignore:
  - "web/app/js/firebase-login.js"
  - "web/app/js/firebase-messaging.js"
  - "web/app/firebase-messaging-sw.js"
