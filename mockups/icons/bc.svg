<svg width="820" height="420" viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="420" fill="#07090c"/>
  <style>
    .lbl{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:17px; fill:#5b6773; }
    .desc{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:13px; fill:#9aa7b4; }
    .wm{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:92px; letter-spacing:-3px; }
    .b{ font-weight:800; } .r{ font-weight:500; }
  </style>

  <line x1="0" y1="210" x2="820" y2="210" stroke="#161b22" stroke-width="1"/>

  <!-- B -->
  <text x="50" y="70" class="lbl">B</text>
  <text x="50" y="160" class="wm">
    <tspan class="b" fill="none" stroke="#5fd7ff" stroke-width="1.5">dark</tspan><tspan class="r" fill="#e6edf3">run</tspan>
  </text>
  <text x="50" y="190" class="desc">dark outlined cyan · run solid white</text>

  <!-- C -->
  <text x="50" y="280" class="lbl">C</text>
  <text x="50" y="370" class="wm">
    <tspan class="b" fill="#5fd7ff">dark</tspan><tspan class="r" fill="#e6edf3">run</tspan>
  </text>
  <text x="50" y="400" class="desc">dark solid cyan · run solid white (full blue/white)</text>
</svg>
